# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main", "devops"]
  pull_request:
    branches: ["main", "devops"]

permissions:
  contents: write
  packages: write

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-frontend

jobs:
  # ==============================================================
  # STAGE 1: Linting
  # ==============================================================
  lint:
    name: "🔍 Lint Code"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm install

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint || echo "Lint warnings bypass"

  # ==============================================================
  # STAGE 2: Software Composition Analysis (SCA)
  # ==============================================================
  sca:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm install

      - name: npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true

  # ==============================================================
  # STAGE 3: Build & Push Container Images
  # ==============================================================
  build:
    name: "🐳 Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: sca
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # FIX: CR_PAT instead of GITHUB_TOKEN
          # GITHUB_TOKEN on a forked repo returns 403 Forbidden when pushing to GHCR.
          # Steps to create CR_PAT:
          #   1. GitHub → Settings → Developer settings → Personal access tokens (classic)
          #   2. Generate new token → check "write:packages" and "read:packages"
          #   3. Your repo → Settings → Secrets and variables → Actions → New secret
          #      Name: CR_PAT  |  Value: (paste the token)
          password: ${{ secrets.CR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================================================
  # STAGE 4: Container Image Scanning (Trivy)
  # ==============================================================
  image-scan:
    name: "🔬 Scan ${{ matrix.component }} Image"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: build
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}:${{ steps.sha.outputs.short }}"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  # ==============================================================
  # STAGE 5: IaC Security Scan (Checkov)
  # ==============================================================
  iac-scan:
    name: "🏗️ IaC Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: lint
    if: github.ref == 'refs/heads/devops'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Checkov manually
        run: pip install checkov==3.2.0 --break-system-packages

      - name: Run Checkov on Kubernetes manifests
        # FIX: replaced bridgecrewio/checkov-action@v12 which crashes with a
        # Python configargparse traceback when --output sarif is injected.
        # Running checkov CLI directly avoids the argument conflict entirely.
        run: |
          checkov -d k8s/ \
            --framework kubernetes \
            --soft-fail \
            --output cli

  # ==============================================================
  # STAGE 6: Dockerfile Lint (Hadolint)
  # ==============================================================
  dockerfile-lint:
    name: "📋 Dockerfile Lint"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: error

  # ==============================================================
  # STAGE 7: Update K8s Manifest with New Image Tag
  # ==============================================================
  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build, image-scan, iac-scan, dockerfile-lint]
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update K8s manifest with new image tags
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.short }}
          MANIFEST_FILE="k8s/jerney.yaml"

          echo "Updating deployment image tags to ${IMAGE_TAG}..."

          # FIX: explicit per-service replacement instead of fragile two-step sed
          sed -i "s|jerney-backend:[^\"' ]*|jerney-backend:${IMAGE_TAG}|g" ${MANIFEST_FILE}
          sed -i "s|jerney-frontend:[^\"' ]*|jerney-frontend:${IMAGE_TAG}|g" ${MANIFEST_FILE}

          echo "✅ Manifest validation:"
          grep "image:" ${MANIFEST_FILE}

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update k8s images to ${{ steps.sha.outputs.short }} [skip ci]"
          # FIX: was hardcoded 'devops' — now uses the actual current branch
          git push origin HEAD:${{ github.ref_name }}
