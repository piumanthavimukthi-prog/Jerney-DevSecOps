# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline
# ==============================================================

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main", "devops"]
  pull_request:
    branches: ["main", "devops"]

permissions:
  contents: write
  packages: write

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/jerney/jerney-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/jerney/jerney-frontend

jobs:
  # ==============================================================
  # STAGE 1: Linting
  # ==============================================================
  lint:
    name: "🔍 Lint Code"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package*.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm install

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint || echo "Lint warnings bypass"

  # ==============================================================
  # STAGE 2: Software Composition Analysis (SCA)
  # ==============================================================
  sca:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package*.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm install

      - name: npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true

  # ==============================================================
  # STAGE 3: Build & Push Container Images
  # ==============================================================
  build:
    name: "🐳 Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: sca
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # FIX: lowercase image path using repository_owner
          images: ghcr.io/${{ github.repository_owner }}/jerney/jerney-${{ matrix.component }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================================================
  # STAGE 4: Container Image Scanning (Trivy)
  # ==============================================================
  image-scan:
    name: "🔬 Scan ${{ matrix.component }} Image"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: build
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          # FIX: lowercase path matches what was actually pushed in Stage 3
          image-ref: "ghcr.io/${{ github.repository_owner }}/jerney/jerney-${{ matrix.component }}:${{ steps.sha.outputs.short }}"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  # ==============================================================
  # STAGE 5: IaC Security Scan (Checkov)
  # ==============================================================
  iac-scan:
    name: "🏗️ IaC Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: lint
    if: github.ref == 'refs/heads/devops'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov==2.3.360 --break-system-packages

      - name: Run Checkov on Kubernetes manifests
        run: checkov -d k8s/ --soft-fail || true

  # ==============================================================
  # STAGE 6: Dockerfile Lint (Hadolint)
  # ==============================================================
  dockerfile-lint:
    name: "📋 Dockerfile Lint"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: error

  # ==============================================================
  # STAGE 7: Update K8s Manifest with New Image Tag
  # ==============================================================
  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build, image-scan, iac-scan, dockerfile-lint]
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # FIX: fetch full history so git push doesn't get rejected
          fetch-depth: 0

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update K8s manifest with new image tags
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.short }}
          MANIFEST_FILE="k8s/jerney.yaml"

          echo "Updating image tags to ${IMAGE_TAG} in ${MANIFEST_FILE}..."

          sed -i "s|jerney-backend:[^\"' ]*|jerney-backend:${IMAGE_TAG}|g" ${MANIFEST_FILE}
          sed -i "s|jerney-frontend:[^\"' ]*|jerney-frontend:${IMAGE_TAG}|g" ${MANIFEST_FILE}

          echo "✅ Manifest validation:"
          grep "image:" ${MANIFEST_FILE}

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update k8s images to ${{ steps.sha.outputs.short }} [skip ci]"
          # FIX: pull rebase before push to avoid rejection when remote has newer commits
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}

