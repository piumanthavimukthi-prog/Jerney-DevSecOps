# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline (Customized for Vimukthi)
# ==============================================================
# Triggers on push and pull requests to main development branches.
# Stages: Lint → SCA → Build → Image Scan → IaC Scan → Dockerfile Lint → Deploy Manifest Update
# ==============================================================

name: Jerney DevSecOps Pipeline


name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["main", "devops"]
  pull_request:
    branches: ["main", "devops"]

# Security: restrict default permissions to read-only
permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-frontend

jobs:
  # ==============================================================
  # STAGE 1: Linting
  # ==============================================================
  lint:
    name: "🔍 Lint Code"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint

  # ==============================================================
  # STAGE 2: Software Composition Analysis (SCA) — Dependency Audit
  # ==============================================================
  sca:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      # npm audit for known vulnerabilities (fail on high/critical)
      - name: npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true

  # ==============================================================
  # STAGE 3: Build & Push Container Images
  # ==============================================================
  build:
    name: "🐳 Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: sca
    permissions:
      contents: read
      packages: write # Needed to push to GHCR
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ==============================================================
  # STAGE 4: Container Image Scanning (Trivy)
  # ==============================================================
  image-scan:
    name: "🔬 Scan ${{ matrix.component }} Image"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: build
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          docker build -t jerney-${{ matrix.component }}:scan ./${{ matrix.component }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "jerney-${{ matrix.component }}:scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          timeout: "10m"

  # ==============================================================
  # STAGE 5: IaC Security Scan (Checkov) — K8s Manifest Check
  # ==============================================================
  iac-scan:
    name: "🏗️ IaC Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Scans the deploy folder for Kubernetes security improvements
      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: deploy/
          framework: kubernetes
          soft_fail: true
          output_format: cli

  # ==============================================================
  # STAGE 6: Dockerfile Lint (Hadolint)
  # ==============================================================
  dockerfile-lint:
    name: "📋 Dockerfile Lint"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: warning

  # ==============================================================
  # STAGE 7: Update K8s Manifest with New Image Tag
  # ==============================================================
  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [image-scan, iac-scan, dockerfile-lint]
    permissions:
      contents: write # Needed to commit manifest changes back to Git
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update K8s manifest with new image tags
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.short }}

          # Find the deployment file inside the deploy/ folder dynamically
          MANIFEST_FILE=$(find deploy/ -name "*.yaml" -o -name "*.yml" | head -n 1)
          echo "Target manifest detected: ${MANIFEST_FILE}"

          if [ -z "${MANIFEST_FILE}" ]; then
            echo "❌ Error: No deployment file found inside deploy/ folder!"
            exit 1
          fi

          # Find the line number of the backend container image
          BACKEND_LINE=$(awk '/- name: backend/{found=1} found && /image:/{print NR; exit}' ${MANIFEST_FILE})
          echo "Backend image at line: ${BACKEND_LINE}"
          sed -i "${BACKEND_LINE}s|.*|          image: ${BACKEND_IMAGE}:${IMAGE_TAG}|" ${MANIFEST_FILE}

          # Find the line number of the frontend container image
          FRONTEND_LINE=$(awk '/- name: frontend/{found=1} found && /image:/{print NR; exit}' ${MANIFEST_FILE})
          echo "Frontend image at line: ${FRONTEND_LINE}"
          sed -i "${FRONTEND_LINE}s|.*|          image: ${FRONTEND_IMAGE}:${IMAGE_TAG}|" ${MANIFEST_FILE}

          echo "✅ Updated images to tag: ${IMAGE_TAG}"
          grep -n "image:" ${MANIFEST_FILE}
          
          # Export path for the next step
          echo "MANIFEST_PATH=${MANIFEST_FILE}" >> $GITHUB_ENV

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.MANIFEST_PATH }}
          git diff --cached --quiet || git commit -m "ci: update k8s images to ${{ steps.sha.outputs.short }} [skip ci]"
          git push# Trigger build test
